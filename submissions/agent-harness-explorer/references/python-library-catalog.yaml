# Curated Python library catalog for the Agent Harness Explorer.
#
# This file is human-maintained reference data. It is intentionally
# independent of any installed version or runtime status. Version numbers,
# availability, and observation dates live in snapshots, never here.
#
# Schema (per entry):
#   name              (required) PyPI distribution name, lowercased.
#   import_name       (required) Top-level module used in `import`.
#   category          (required) One value from the category taxonomy below.
#   description       (required) One short human-readable sentence.
#   documentation_url (required) Official documentation, https preferred.
#   tags              (optional) Lowercase keywords for task-based lookup.
#
# Category taxonomy:
#   Office documents, Data, Data science, AI, Web, Networking, Images,
#   Documents, Serialization, Testing, Utilities, Cloud, Databases,
#   Visualization, Security.
#
# Contribution guidelines: keep descriptions to a single neutral sentence,
# link to official docs (not blog posts), pick the closest existing category
# before inventing a new one, and keep entries sorted by name.

